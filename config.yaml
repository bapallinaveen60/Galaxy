train:
  pre_dir: train/pre-event
  post_dir: train/post-event
  mask_dir: train/target

  batch_size: 8       
  lr: 0.0001
  epochs: 80
  num_workers: 4

  image_size: 384
  seed: 42
  log_interval: 20


val:
  pre_dir: val/pre-event
  post_dir: val/post-event
  mask_dir: val/target

  batch_size: 2
  num_workers: 4


test:
  pre_dir: test/pre-event
  post_dir: test/post-event
  mask_dir: test/target

  batch_size: 2
  num_workers: 4


# ✅ FIXED MODEL CONFIG
model:
  eo_channels: 3       # EO (RGB)
  sar_channels: 1      # SAR (single band)
  out_channels: 2


optimizer:
  type: adam
  weight_decay: 0.00001


loss:
  type: focal_dice     # updated
  class_weights: [1.0, 3.0]